<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 of March</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class = "main">
    <h1>Enter your name</h1>
    <div class = "inputs">
        <div class  ="container1">
        <input type="text" id="password">
    </div>
    <div class  ="container2">
        <button onclick="checkAccess()">Submit</button>
    </div>
    



  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="script.js"></script>

<p id="error"></p>
    </div>
</div>
<script>
  const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');

const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

hands.onResults((results) => {
  canvasCtx.save();
canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);


canvasCtx.scale(-1, 1); 
canvasCtx.translate(-canvasElement.width, 0);

canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

if (results.multiHandLandmarks) {
  for (const landmarks of results.multiHandLandmarks) {
    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS);
    drawLandmarks(canvasCtx, landmarks);
  }
}

canvasCtx.restore();
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

  canvasCtx.drawImage(
    results.image, 0, 0,
    canvasElement.width, canvasElement.height
  );

  if (results.multiHandLandmarks) {
    for (const landmarks of results.multiHandLandmarks) {
      drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS);
      drawLandmarks(canvasCtx, landmarks);
    }
  }

  canvasCtx.restore();
});

const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({ image: videoElement });
  },
  width: 640,
  height: 480
});

camera.start();
    function checkAccess() {
  const pw = document.getElementById("password").value.toLowerCase().trim();

  if (pw === "inzhu_a") {
    window.location.href = "inzhu_a.html";
  }
  else if (pw === "korkem") {
    window.location.href = "korkem.html";
  }
  else if (pw === "alima") {
    window.location.href = "alima.html";
  }
  else if (pw === "dariya") {
    window.location.href = "dariya.html";
  }
  else if (pw === "inzhu_s") {
    window.location.href = "inzhu_s.html";
  }
  else {
    document.getElementById("error").innerText = "Wrong name";
  }
}
</script>
</body>
</html>
