<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 of March</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class = "main">
    <h1>Photo Booth</h1>
</div>
<div class = "camera">
 <video id="video" autoplay playsinline style = "display:none";></video>
 <canvas id="canvas" width="640" height="480"></canvas>
</div>
<button id="capture">Take Photo</button>
<a id="downloadLink" style="display:none;"></a>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="script.js"></script>
  <script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');

const captureBtn = document.getElementById("capture");
const downloadLink = document.getElementById("downloadLink");

// ================= HANDS =================
const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

let currentEmoji = "";
let countdown = null;  
let takingPhoto = false;

hands.onResults(results => {
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);


  canvasCtx.scale(-1, 1);
  canvasCtx.translate(-canvasElement.width, 0);
  canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
  canvasCtx.restore();

  currentEmoji = "";

  if (results.multiHandLandmarks) {
    for (let landmarks of results.multiHandLandmarks) {

      const thumb = landmarks[12];
      const index = landmarks[8];

      const dx = thumb.x - index.x;
      const dy = thumb.y - index.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 0.05) {
        currentEmoji = "❤️";
      }

      const middle = landmarks[12];
      if (index.y < landmarks[6].y && middle.y < landmarks[10].y) {
        currentEmoji = "✨";
      }
    }
  }


  if (currentEmoji !== "") {
    canvasCtx.font = "80px Arial";
    canvasCtx.fillText(currentEmoji, canvasElement.width / 2 - 40, 100);
  }

  if (countdown !== null) {
    canvasCtx.font = "120px Arial";
    canvasCtx.fillStyle = "white";
    canvasCtx.fillText(countdown, canvasElement.width / 2 - 30, canvasElement.height / 2);
  }
});


const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({ image: videoElement });
  },
  width: 640,
  height: 480
});

camera.start();


function startCountdown() {
  if (takingPhoto) return;

  takingPhoto = true;
  countdown = 3;

  const interval = setInterval(() => {
    countdown--;

    if (countdown === 0) {
      clearInterval(interval);
      countdown = null;
      takePhoto();
      takingPhoto = false;
    }
  }, 1000);
}


function takePhoto() {
  const image = canvasElement.toDataURL("image/png");
  downloadLink.href = image;
  downloadLink.download = "photo.png";
  downloadLink.click();
}

captureBtn.addEventListener("click", startCountdown);

</script>
</body>
