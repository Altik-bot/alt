<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 of March</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class = "main">
    <h1>Photo Booth</h1>
</div>
<div class = "camera">
 <video id="video" autoplay playsinline style = "display:none";></video>
 <canvas id="canvas" width="640" height="480"></canvas>
</div>
<button id="capture">Take Photo</button>
<a id="downloadLink" style="display:none;"></a>
    <div id="gallery"></div>
<div id="links"></div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="script.js"></script>
  <script>
      let countdown = 0;
let countdownInterval = null;
      const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');
const camera = new Camera(videoElement, {
  onFrame: async () => {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    // mirror
    canvasCtx.scale(-1, 1);
    canvasCtx.translate(-canvasElement.width, 0);

    canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

    // draw countdown number
    if (countdown > 0) {
      canvasCtx.restore(); // reset mirror for text
      canvasCtx.save();

      canvasCtx.fillStyle = "white";
      canvasCtx.font = "bold 120px Montserrat";
      canvasCtx.textAlign = "center";
      canvasCtx.textBaseline = "middle";
      if(countdown != 1){
        canvasCtx.fillText(
        countdown - 1,
        canvasElement.width / 2,
        canvasElement.height / 2
      );
      }
    
    }

    canvasCtx.restore();
  },
  width: 640,
  height: 480
});

camera.start();
      const captureBtn = document.getElementById("capture");
const downloadLink = document.getElementById("downloadLink");

let photoCount = 0;       // tracks how many photos taken
let totalPhotos = 4;      // total photos to take

captureBtn.addEventListener("click", () => {
  if (countdownInterval) return; // prevent double click

  photoCount = 0;

  function takePhoto() {
    countdown = 4;

    countdownInterval = setInterval(() => {
      countdown--;

      if (countdown === 0) {
        clearInterval(countdownInterval);
        countdownInterval = null;

        // Save the photo
        const base64Image = canvasElement.toDataURL("image/png"); // rename 'image' to 'base64Image'
        downloadLink.href = base64Image;
        downloadLink.download = `photo_${photoCount + 1}.png`;
        downloadLink.click();
uploadToCloudinary(base64Image);
        photoCount++;

        if (photoCount < totalPhotos) {
          // take next photo after a short delay
          setTimeout(takePhoto, 1000);
        }
      }
    }, 1000);
  }

  takePhoto(); // start the first photo
});
camera.start();   

</script>
    <script>
        const cloudName = "dmkweisin";
const uploadPreset = "womens-day";

async function uploadToCloudinary(base64Image) {
  const url = `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`;

  const formData = new FormData();
  formData.append("file", base64Image);
  formData.append("upload_preset", uploadPreset);
  formData.append("folder", "womens_day_booth");

  try {
    const response = await fetch(url, {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    const imageUrl = data.secure_url;

    displayImage(imageUrl);
    displayLink(imageUrl);

  } catch (error) {
    console.error("Upload failed:", error);
  }
}
        function displayImage(url) {
  const img = document.createElement("img");
  img.src = url;
  img.style.width = "150px";
  img.style.margin = "10px";
  document.getElementById("gallery").appendChild(img);
}

function displayLink(url) {
  const link = document.createElement("a");
  link.href = url;
  link.textContent = "View Photo";
  link.target = "_blank";

  const br = document.createElement("br");

  document.getElementById("links").appendChild(link);
  document.getElementById("links").appendChild(br);
}
    </script>

</body>
