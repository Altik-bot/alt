<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 of March</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "music">
    <audio id = "music" autoplay loop>
      <source src = "Saggie - Easy to Love - Instrumental version.mp3" type = "audio/mpeg">
    </audio>
  </div>
<div class = "main">
    <h1>Photo Booth</h1>
</div>
<div class = "camera">
 <video id="video" autoplay playsinline style = "display:none";></video>
 <canvas id="canvas" width="640" height="480"></canvas>
</div>
<button id="capture">Take Photo</button>
<a id="downloadLink" style="display:none;"></a>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="script.js"></script>
  <script>
      let countdown = 0;
let countdownInterval = null;
      const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');
const camera = new Camera(videoElement, {
  onFrame: async () => {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    // mirror
    canvasCtx.scale(-1, 1);
    canvasCtx.translate(-canvasElement.width, 0);

    canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

    // draw countdown number
    if (countdown > 0) {
      canvasCtx.restore(); // reset mirror for text
      canvasCtx.save();

      canvasCtx.fillStyle = "white";
      canvasCtx.font = "bold 120px Montserrat";
      canvasCtx.textAlign = "center";
      canvasCtx.textBaseline = "middle";
      if(countdown != 1){
        canvasCtx.fillText(
        countdown - 1,
        canvasElement.width / 2,
        canvasElement.height / 2
      );
      }
    
    }

    canvasCtx.restore();
  },
  width: 640,
  height: 480
});

camera.start();const captureBtn = document.getElementById("capture");
const downloadLink = document.getElementById("downloadLink");

let photoCount = 0;       // tracks how many photos taken
let totalPhotos = 4;      // total photos to take

captureBtn.addEventListener("click", () => {
  if (countdownInterval) return; // prevent double click

  photoCount = 0;

  function takePhoto() {
    countdown = 4;

    countdownInterval = setInterval(() => {
      countdown--;

      if (countdown === 0) {
        clearInterval(countdownInterval);
        countdownInterval = null;

        // Save the photo
        const image = canvasElement.toDataURL("image/png");
        downloadLink.href = image;
        downloadLink.download = `photo_${photoCount + 1}.png`;
        downloadLink.click();

        photoCount++;

        if (photoCount < totalPhotos) {
          // take next photo after a short delay
          setTimeout(takePhoto, 1000);
        }
      }
    }, 1000);
  }

  takePhoto(); // start the first photo
});
camera.start();   

</script>

</body>
