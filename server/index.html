<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Air Quality Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="logo">Air Monitor</div>

  <div class="actions">
    <button onclick="load()">Refresh</button>
    <button onclick="toggle()" id="toggleBtn">Auto ON</button>
  </div>
</header>

<div class="layout">

  <aside class="panel">
    <div class="section-title">Status</div>
    <div class="status">Live sensor feed active</div>

    <div class="section-title">Legend</div>

    <div class="legend-item"><span class="dot low"></span>Low</div>
    <div class="legend-item"><span class="dot medium"></span>Medium</div>
    <div class="legend-item"><span class="dot high"></span>High</div>
    <div class="legend-item"><span class="dot very"></span>Very high</div>
  </aside>

  <main id="map"></main>

</div>

<script src="app.js"></script>

</body>
</html>
