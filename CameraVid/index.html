<!DOCTYPE html>
<html>
<head>
  <title>Shape Recognition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      gap: 12px;
    }
    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #00e5ff;
    }
    #main {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    #output-canvas {
      display: block;
      border: 1px solid #333;
    }
    #info-panel {
      width: 230px;
      min-height: 480px;
      background: #141414;
      border: 1px solid #222;
      padding: 14px;
      overflow-y: auto;
    }
    #info-panel h2 {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 12px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }
    .shape-card {
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 10px;
      margin-bottom: 10px;
      background: #1a1a1a;
    }
    .shape-card.circle    { border-left: 3px solid #00e5ff; }
    .shape-card.ellipse   { border-left: 3px solid #ff9800; }
    .shape-card.rectangle { border-left: 3px solid #76ff03; }
    .shape-card.square    { border-left: 3px solid #76ff03; }
    .shape-card.triangle  { border-left: 3px solid #e040fb; }
    .shape-name {
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .shape-name.circle    { color: #00e5ff; }
    .shape-name.ellipse   { color: #ff9800; }
    .shape-name.rectangle { color: #76ff03; }
    .shape-name.square    { color: #76ff03; }
    .shape-name.triangle  { color: #e040fb; }
    .shape-info { font-size: 0.68rem; color: #888; line-height: 1.9; }
    .shape-info span { color: #ccc; }
    #status {
      font-size: 0.72rem;
      color: #ff9800;
      letter-spacing: 0.05em;
      min-height: 1.2em;
    }
    #no-shapes { font-size: 0.7rem; color: #333; text-align: center; margin-top: 40px; }
  </style>
</head>
<body>
  <h1>Shape Recognition</h1>
  <div id="status">Loading OpenCV.js...</div>

  <div id="main">
    <div>
      <video id="video" autoplay playsinline muted style="display:none;" width="640" height="480"></video>
      <canvas id="output-canvas" width="640" height="480"></canvas>
    </div>
    <div id="info-panel">
      <h2>Detected Shapes</h2>
      <div id="shape-list"><div id="no-shapes">No shapes detected</div></div>
    </div>
  </div>

  <script src="https://docs.opencv.org/4.8.0/opencv.js"></script>
  <script>
    const video     = document.getElementById('video');
    const canvas    = document.getElementById('output-canvas');
    const ctx       = canvas.getContext('2d');
    const statusEl  = document.getElementById('status');
    const shapeList = document.getElementById('shape-list');

    const W = 640, H = 480;

    const COLORS = {
      circle:    '#00e5ff',
      ellipse:   '#ff9800',
      rectangle: '#76ff03',
      square:    '#76ff03',
      triangle:  '#e040fb'
    };

    function hexToRgb(hex) {
      return [
        parseInt(hex.slice(1,3), 16),
        parseInt(hex.slice(3,5), 16),
        parseInt(hex.slice(5,7), 16)
      ];
    }

    function waitForOpenCV(cb) {
      if (typeof cv !== 'undefined' && cv.Mat) {
        cb();
      } else {
        setTimeout(() => waitForOpenCV(cb), 200);
      }
    }

    function startCamera(cb) {
      navigator.mediaDevices.getUserMedia({ video: { width: W, height: H, facingMode: { exact: 'environment' } }, audio: false })
        .then(stream => {
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            video.play();
            // Give video a moment to produce frames
            setTimeout(cb, 500);
          };
        })
        .catch(err => {
          statusEl.textContent = 'Camera error: ' + err.message;
        });
    }

    function classifyContour(contour) {
      const area = cv.contourArea(contour);
      if (area < 2000) return null;

      const perimeter = cv.arcLength(contour, true);
      if (perimeter < 100) return null;

      const approx = new cv.Mat();
      cv.approxPolyDP(contour, approx, 0.04 * perimeter, true);
      const vertices = approx.rows;
      approx.delete();

      const rect        = cv.boundingRect(contour);
      const hull        = new cv.Mat();
      cv.convexHull(contour, hull);
      const hullArea    = cv.contourArea(hull);
      hull.delete();
      const solidity    = area / (hullArea || 1);
      const circularity = (4 * Math.PI * area) / (perimeter * perimeter || 1);

      let type = null;

      if (vertices >= 7 && circularity > 0.75) {
        let ratio = 1;
        if (contour.rows >= 5) {
          try {
            const re = cv.fitEllipse(contour);
            const major = Math.max(re.size.width, re.size.height);
            const minor = Math.min(re.size.width, re.size.height);
            ratio = minor / (major || 1);
          } catch(e) {}
        }
        type = ratio > 0.82 ? 'circle' : 'ellipse';
      } else if (vertices === 3 && solidity > 0.75) {
        type = 'triangle';
      } else if (vertices === 4) {
        const ar = rect.width / (rect.height || 1);
        type = (ar > 0.85 && ar < 1.15) ? 'square' : 'rectangle';
      }

      return type ? { type, rect, area, perimeter, vertices, circularity, solidity } : null;
    }

    function drawShape(shape, contour) {
      const color   = COLORS[shape.type];
      const [r,g,b] = hexToRgb(color);
      const { x, y, width, height } = shape.rect;
      const cx = Math.round(x + width / 2);
      const cy = Math.round(y + height / 2);

      // Contour points
      const pts = [];
      for (let i = 0; i < contour.rows; i++) {
        pts.push({
          x: contour.data32S[i * 2],
          y: contour.data32S[i * 2 + 1]
        });
      }

      // Perimeter
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.closePath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = `rgba(${r},${g},${b},0.07)`;
      ctx.fill();

      // Bounding box
      ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 4]);
      ctx.strokeRect(x, y, width, height);
      ctx.setLineDash([]);

      // Center crosshair
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(cx - 14, cy); ctx.lineTo(cx + 14, cy);
      ctx.moveTo(cx, cy - 14); ctx.lineTo(cx, cy + 14);
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
      ctx.fillStyle = color;
      ctx.fill();

      return { cx, cy };
    }

    function updatePanel(shapes) {
      if (!shapes.length) {
        shapeList.innerHTML = '<div id="no-shapes">No shapes detected</div>';
        return;
      }
      shapeList.innerHTML = shapes.map(s => `
        <div class="shape-card ${s.type}">
          <div class="shape-name ${s.type}">${s.type}</div>
          <div class="shape-info">
            Center &nbsp;&nbsp;&nbsp;&nbsp;: <span>${s.cx}, ${s.cy}</span><br>
            Bbox &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: <span>${s.rect.width} x ${s.rect.height} px</span><br>
            Area &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: <span>${Math.round(s.area)} px²</span><br>
            Perimeter &nbsp;: <span>${Math.round(s.perimeter)} px</span><br>
            Circularity: <span>${s.circularity.toFixed(2)}</span><br>
            Solidity &nbsp;&nbsp;: <span>${s.solidity.toFixed(2)}</span>
          </div>
        </div>
      `).join('');
    }

    let running = false;

    function processFrame() {
      if (!running) return;

      // Draw video frame as-is (back camera, no mirror needed)
      ctx.drawImage(video, 0, 0, W, H);

      let src, gray, blurred, edges, dilated, contours, hierarchy, kernel;

      try {
        const imgData = ctx.getImageData(0, 0, W, H);
        src       = cv.matFromImageData(imgData);
        gray      = new cv.Mat();
        blurred   = new cv.Mat();
        edges     = new cv.Mat();
        dilated   = new cv.Mat();
        contours  = new cv.MatVector();
        hierarchy = new cv.Mat();

        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        cv.GaussianBlur(gray, blurred, new cv.Size(9, 9), 2);
        cv.Canny(blurred, edges, 30, 100);

        kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
        cv.dilate(edges, dilated, kernel);

        cv.findContours(dilated, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

        const detected = [];

        for (let i = 0; i < contours.size(); i++) {
          const contour = contours.get(i);
          const shape   = classifyContour(contour);
          if (shape) {
            const center = drawShape(shape, contour);
            detected.push({ ...shape, ...center });
          }
          contour.delete();
        }

        updatePanel(detected);

      } catch(e) {
        console.error('Frame error:', e);
      } finally {
        if (src)       src.delete();
        if (gray)      gray.delete();
        if (blurred)   blurred.delete();
        if (edges)     edges.delete();
        if (dilated)   dilated.delete();
        if (kernel)    kernel.delete();
        if (contours)  contours.delete();
        if (hierarchy) hierarchy.delete();
      }

      requestAnimationFrame(processFrame);
    }

    // Boot
    waitForOpenCV(() => {
      statusEl.textContent = 'OpenCV ready. Starting camera...';
      startCamera(() => {
        statusEl.textContent = '';
        running = true;
        processFrame();
      });
    });
  </script>
</body>
</html>
