<!DOCTYPE html>
<html>
<head>
  <title>MediaPipe Hand Tracking</title>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="script.js"></script>
  <script>const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');

const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});
let maxRadius = 80;       // final radius after 4 seconds
let minRadius = 10;       // starting radius
let touchStartTime = null; 

hands.onResults((results) => {
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
  canvasCtx.save();
  canvasCtx.scale(-1, 1);
  canvasCtx.translate(-canvasElement.width, 0);
  canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

  if (results.multiHandLandmarks && results.multiHandedness && results.multiHandLandmarks.length === 2) {
    const leftIndex = results.multiHandLandmarks.find((_, i) => results.multiHandedness[i].label === "Left")[8];
    const rightIndex = results.multiHandLandmarks.find((_, i) => results.multiHandedness[i].label === "Right")[8];

    const dx = leftIndex.x - rightIndex.x;
    const dy = leftIndex.y - rightIndex.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 0.05) {
      // Fingers touching, start timer
      if (!touchStartTime) touchStartTime = performance.now();
      const elapsed = (performance.now() - touchStartTime) / 1000; // seconds

      // Calculate radius: grow from minRadius to maxRadius over 4 seconds
      let radius = Math.min(minRadius + (maxRadius - minRadius) * (elapsed / 4), maxRadius);

      // Draw circles on both fingertips
      [leftIndex, rightIndex].forEach(index => {
        canvasCtx.beginPath();
        canvasCtx.arc(index.x * canvasElement.width, index.y * canvasElement.height, radius, 0, 2 * Math.PI);
        canvasCtx.fillStyle = "purple";
        canvasCtx.fill();
      });

    } else {
      // Fingers apart, reset
      touchStartTime = null;
    }
  }

  canvasCtx.restore();
});

const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({ image: videoElement });
  },
  width: 640,
  height: 480
});

camera.start();</script>
</body>
</html>
