<!DOCTYPE html>
<html>
<head>
  <title>MediaPipe Hand Tracking</title>
</head>
<body>
  <video id="video" autoplay playsinline style = "display: none;"></video>
  <canvas id="canvas"  width="640" height="480"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="script.js"></script>
  <script>const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');

const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});
hands.onResults((results) => {
  // Clear canvas
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

  // Mirror canvas for selfie view
  canvasCtx.save();
  canvasCtx.scale(-1, 1);
  canvasCtx.translate(-canvasElement.width, 0);

  // Draw video frame
  canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

  // Only proceed if at least one hand detected
  if (results.multiHandLandmarks && results.multiHandedness) {
    const handsCount = results.multiHandLandmarks.length;

    // Loop through all hands and draw circles
    for (let i = 0; i < handsCount; i++) {
      const landmarks = results.multiHandLandmarks[i];
      const handedness = results.multiHandedness[i].label; // "Left" or "Right"

    
      let color = handedness === "Left" ? "red" : "blue";

     

      // Index fingertip
      const indexTip = landmarks[8];
      const x = indexTip.x * canvasElement.width;
      const y = indexTip.y * canvasElement.height;

      // Draw circle
      canvasCtx.beginPath();
      canvasCtx.arc(x, y, 15 , 0, 2 * Math.PI);
      canvasCtx.fillStyle = color;
      canvasCtx.fill();
    }

    // Check distance between left and right index fingertips if two hands
    if (handsCount === 2) {
      const leftIndex = results.multiHandLandmarks.find((_, i) => results.multiHandedness[i].label === "Left")[8];
      const rightIndex = results.multiHandLandmarks.find((_, i) => results.multiHandedness[i].label === "Right")[8];

      const dx = leftIndex.x - rightIndex.x;
      const dy = leftIndex.y - rightIndex.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 0.05) { // threshold for "touching"
        // Draw green circles on both fingertips
        canvasCtx.beginPath();
        for( let i = 0;i<=70;i+=1){
        canvasCtx.arc(leftIndex.x * canvasElement.width, leftIndex.y * canvasElement.height, i, 0, 2 * Math.PI);
        canvasCtx.fillStyle = "purple";
        canvasCtx.fill();

        canvasCtx.beginPath();
        canvasCtx.arc(rightIndex.x * canvasElement.width, rightIndex.y * canvasElement.height, i, 0, 2 * Math.PI);
        canvasCtx.fillStyle = "purple";
        canvasCtx.fill();
      }
    }
    }
  }

  canvasCtx.restore();
});

const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({ image: videoElement });
  },
  width: 640,
  height: 480
});

camera.start();</script>
</body>
</html>
