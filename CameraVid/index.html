<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Distance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      padding: 12px;
      gap: 10px;
    }
    h1 {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #00e5ff;
    }
    #controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    button {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      padding: 7px 14px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    button:active { background: #2a2a2a; }
    #clear-btn { border-color: #ff4444; color: #ff4444; }
    label { font-size: 0.7rem; color: #555; }
    input[type=range] { width: 100px; accent-color: #00e5ff; }
    #dot-count { font-size: 0.65rem; color: #444; }
    #status { font-size: 0.68rem; color: #ff9800; min-height: 1.1em; }
    #canvas-wrapper { width: 100%; max-width: 720px; }
    #output-canvas { display: block; width: 100%; height: auto; border: 1px solid #222; object-fit: cover; }
  </style>
</head>
<body>
  <h1>Dot Distance</h1>
  <div id="status">Starting camera...</div>

  <div id="controls">
    <label>Dots <input type="range" id="dot-slider" min="2" max="10" value="3"></label>
    <span id="dot-count">3 dots · 3 lines</span>
    <button id="clear-btn">Reshuffle</button>
  </div>

  <div id="canvas-wrapper">
    <video id="video" autoplay playsinline muted style="display:none;" width="720" height="960"></video>
    <canvas id="output-canvas" width="720" height="960"></canvas>
  </div>

  <script>
    const video    = document.getElementById('video');
    const canvas   = document.getElementById('output-canvas');
    const ctx      = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const countEl  = document.getElementById('dot-count');
    const slider   = document.getElementById('dot-slider');
    const clearBtn = document.getElementById('clear-btn');

    const W = 720, H = 960;
    let CW = W, CH = H; // actual canvas dims, set after video loads
    const MARGIN = 60;

    const DOT_COLOR = '#ffffff';

    let dots = [];
    let pairs = [];
    let running = false;

    // Each dot drifts slowly so they feel alive
    function randomDot(i) {
      return {
        x:  MARGIN + Math.random() * (CW - MARGIN * 2),
        y:  MARGIN + Math.random() * (CH - MARGIN * 2),
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
        color: DOT_COLOR,
        id: i + 1
      };
    }

    function spawnDots(n) {
      dots = Array.from({ length: n }, (_, i) => randomDot(i));
      pairs = randomPairs(n);
      updateCount();
    }

    // Pick roughly n random unique pairs (no duplicates, no self-pairs)
    function randomPairs(n) {
      if (n < 2) return [];
      const all = [];
      for (let i = 0; i < n; i++)
        for (let j = i + 1; j < n; j++)
          all.push([i, j]);
      // Shuffle and take roughly half, minimum 1
      for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
      }
      const count = Math.max(1, Math.floor(all.length / 2));
      return all.slice(0, count);
    }

    function updateCount() {
      const n = dots.length;
      const p = pairs.length;
      countEl.textContent = `${n} dot${n !== 1 ? 's' : ''} · ${p} line${p !== 1 ? 's' : ''}`;
    }

    slider.addEventListener('input', () => spawnDots(parseInt(slider.value)));
    clearBtn.addEventListener('click', () => spawnDots(parseInt(slider.value)));

    // ── Camera ──────────────────────────────────────────────
    navigator.mediaDevices.getUserMedia({
      video: { width: W, height: H, facingMode: { exact: 'environment' } },
      audio: false
    })
    .catch(() => navigator.mediaDevices.getUserMedia({
      video: { width: W, height: H },
      audio: false
    }))
    .then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        setTimeout(() => {
          // Match canvas exactly to what the camera delivers
          CW = video.videoWidth  || W;
          CH = video.videoHeight || H;
          canvas.width  = CW;
          canvas.height = CH;
          statusEl.textContent = '';
          running = true;
          spawnDots(parseInt(slider.value));
          setInterval(() => spawnDots(parseInt(slider.value)), 100);
          loop();
        }, 500);
      };
    })
    .catch(err => {
      statusEl.textContent = 'Camera error: ' + err.message;
    });

    // ── Physics: drift and bounce off walls ─────────────────
    function updateDots() {
      dots.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;
        if (d.x < MARGIN || d.x > CW - MARGIN) d.vx *= -1;
        if (d.y < MARGIN || d.y > CH - MARGIN) d.vy *= -1;
        d.x = Math.max(MARGIN, Math.min(CW - MARGIN, d.x));
        d.y = Math.max(MARGIN, Math.min(CH - MARGIN, d.y));
      });
    }

    // ── Distance ────────────────────────────────────────────
    function dist(a, b) {
      return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
    }

    // ── Draw ────────────────────────────────────────────────
    function draw() {
      ctx.drawImage(video, 0, 0, CW, CH);

      // Subtle dark overlay
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.fillRect(0, 0, CW, CH);

      if (dots.length < 2) return;

      // Lines between random pairs only
      pairs.forEach(([i, j]) => {
          const a = dots[i];
          const b = dots[j];
          const d = dist(a, b);
          const mx = (a.x + b.x) / 2;
          const my = (a.y + b.y) / 2;

          // Thin line
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = 'rgba(255,255,255,0.35)';
          ctx.lineWidth = 0.8;
          ctx.setLineDash([]);
          ctx.stroke();

          // Label
          const label = `${Math.round(d)}px`;
          ctx.font = '11px Courier New';
          const tw = ctx.measureText(label).width;

          ctx.fillStyle = 'rgba(0,0,0,0.55)';
          ctx.fillRect(mx - tw / 2 - 4, my - 9, tw + 8, 17);

          ctx.fillStyle = 'rgba(255,255,255,0.8)';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(label, mx, my);
      });

      // Small dots on top
      dots.forEach(dot => {
        // Glow
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, 7, 0, 2 * Math.PI);
        ctx.strokeStyle = dot.color;
        ctx.lineWidth = 1.2;
        ctx.shadowColor = dot.color;
        ctx.shadowBlur = 8;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Fill
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, 4, 0, 2 * Math.PI);
        ctx.fillStyle = dot.color;
        ctx.fill();

        // Number
        ctx.font = 'bold 9px Courier New';
        ctx.fillStyle = '#000';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(dot.id, dot.x, dot.y);
      });
    }

    // ── Loop ────────────────────────────────────────────────
    function loop() {
      if (!running) return;
      updateDots();
      draw();
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
