<!DOCTYPE html>
<html>
<head>
  <title>Shape Recognition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.2rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #00e5ff;
      margin-bottom: 16px;
    }

    #main {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    #canvasWrapper {
      position: relative;
    }

    canvas {
      display: block;
      border: 1px solid #333;
    }

    #hidden-video { display: none; }

    #info-panel {
      width: 220px;
      min-height: 480px;
      background: #141414;
      border: 1px solid #222;
      padding: 14px;
      overflow-y: auto;
    }

    #info-panel h2 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 12px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    .shape-card {
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 10px;
      background: #1a1a1a;
      transition: border-color 0.2s;
    }

    .shape-card.circle    { border-left: 3px solid #00e5ff; }
    .shape-card.ellipse   { border-left: 3px solid #ff9800; }
    .shape-card.rectangle { border-left: 3px solid #76ff03; }
    .shape-card.square    { border-left: 3px solid #76ff03; }
    .shape-card.triangle  { border-left: 3px solid #e040fb; }

    .shape-name {
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .shape-name.circle    { color: #00e5ff; }
    .shape-name.ellipse   { color: #ff9800; }
    .shape-name.rectangle { color: #76ff03; }
    .shape-name.square    { color: #76ff03; }
    .shape-name.triangle  { color: #e040fb; }

    .shape-info {
      font-size: 0.7rem;
      color: #888;
      line-height: 1.8;
    }

    .shape-info span {
      color: #ccc;
    }

    #status {
      font-size: 0.72rem;
      color: #444;
      margin-top: 10px;
      text-align: center;
      letter-spacing: 0.05em;
    }

    #no-shapes {
      font-size: 0.72rem;
      color: #333;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <h1>Shape Recognition</h1>

  <div id="main">
    <div id="canvasWrapper">
      <video id="hidden-video" autoplay playsinline></video>
      <canvas id="output-canvas" width="640" height="480"></canvas>
      <div id="status">Loading OpenCV...</div>
    </div>

    <div id="info-panel">
      <h2>Detected Shapes</h2>
      <div id="shape-list"><div id="no-shapes">No shapes detected</div></div>
    </div>
  </div>

  <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady()"></script>

  <script>
    const video  = document.getElementById('hidden-video');
    const canvas = document.getElementById('output-canvas');
    const ctx    = canvas.getContext('2d');
    const status = document.getElementById('status');
    const shapeList = document.getElementById('shape-list');

    const COLORS = {
      circle:    '#00e5ff',
      ellipse:   '#ff9800',
      rectangle: '#76ff03',
      square:    '#76ff03',
      triangle:  '#e040fb'
    };

    let cvReady = false;

    function onOpenCvReady() {
      cv['onRuntimeInitialized'] = () => {
        cvReady = true;
        status.textContent = 'Starting camera...';
        startCamera();
      };
    }

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false })
        .then(stream => {
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            status.textContent = '';
            processLoop();
          };
        })
        .catch(err => {
          status.textContent = 'Camera error: ' + err.message;
        });
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return [r, g, b];
    }

    function classifyContour(contour) {
      const area = cv.contourArea(contour);
      if (area < 1500) return null;

      const perimeter = cv.arcLength(contour, true);
      const approx = new cv.Mat();
      cv.approxPolyDP(contour, approx, 0.04 * perimeter, true);
      const vertices = approx.rows;

      const rect    = cv.boundingRect(contour);
      const hull    = new cv.Mat();
      cv.convexHull(contour, hull);
      const hullArea  = cv.contourArea(hull);
      const solidity  = area / (hullArea || 1);
      const circularity = (4 * Math.PI * area) / (perimeter * perimeter);

      let type = null;

      if (vertices >= 8 && circularity > 0.78) {
        // Distinguish circle vs ellipse
        const rotRect = cv.fitEllipse(contour);
        const majorAxis = Math.max(rotRect.size.width, rotRect.size.height);
        const minorAxis = Math.min(rotRect.size.width, rotRect.size.height);
        const ratio = minorAxis / (majorAxis || 1);
        type = ratio > 0.85 ? 'circle' : 'ellipse';
      } else if (vertices === 3 && solidity > 0.8) {
        type = 'triangle';
      } else if (vertices === 4) {
        const aspectRatio = rect.width / (rect.height || 1);
        type = (aspectRatio > 0.85 && aspectRatio < 1.15) ? 'square' : 'rectangle';
      }

      const result = type ? { type, approx, rect, area, perimeter, vertices, circularity } : null;
      if (!result) approx.delete();
      hull.delete();
      return result;
    }

    function drawShapeOverlay(shape, contour) {
      const color = COLORS[shape.type];
      const [r, g, b] = hexToRgb(color);

      // Draw perimeter highlight (thick colored outline)
      const pts = [];
      for (let i = 0; i < contour.rows; i++) {
        pts.push({ x: contour.data32S[i * 2], y: contour.data32S[i * 2 + 1] });
      }

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.closePath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Semi-transparent fill
      ctx.fillStyle = `rgba(${r},${g},${b},0.08)`;
      ctx.fill();

      // Bounding box
      const { x, y, width, height } = shape.rect;
      ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 4]);
      ctx.strokeRect(x, y, width, height);
      ctx.setLineDash([]);

      // Center point
      const cx = Math.round(x + width / 2);
      const cy = Math.round(y + height / 2);

      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
      ctx.fillStyle = color;
      ctx.fill();

      // Crosshair at center
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - 12, cy); ctx.lineTo(cx + 12, cy);
      ctx.moveTo(cx, cy - 12); ctx.lineTo(cx, cy + 12);
      ctx.stroke();

      return { cx, cy };
    }

    function updateInfoPanel(shapes) {
      if (shapes.length === 0) {
        shapeList.innerHTML = '<div id="no-shapes">No shapes detected</div>';
        return;
      }

      shapeList.innerHTML = shapes.map((s, i) => `
        <div class="shape-card ${s.type}">
          <div class="shape-name ${s.type}">${s.type}</div>
          <div class="shape-info">
            Center: <span>${s.cx}, ${s.cy}</span><br>
            Bounding box: <span>${s.rect.width} x ${s.rect.height} px</span><br>
            Area: <span>${Math.round(s.area)} px²</span><br>
            Perimeter: <span>${Math.round(s.perimeter)} px</span><br>
            Circularity: <span>${s.circularity.toFixed(2)}</span><br>
            Vertices: <span>${s.vertices >= 8 ? '8+' : s.vertices}</span>
          </div>
        </div>
      `).join('');
    }

    function processLoop() {
      if (!cvReady) { requestAnimationFrame(processLoop); return; }

      // Draw mirrored video frame
      ctx.save();
      ctx.scale(-1, 1);
      ctx.translate(-canvas.width, 0);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      // Process with OpenCV
      const src = new cv.Mat(canvas.height, canvas.width, cv.CV_8UC4);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      src.data.set(imgData.data);

      const gray    = new cv.Mat();
      const blurred = new cv.Mat();
      const edges   = new cv.Mat();
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();

      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, blurred, new cv.Size(7, 7), 1.5);
      cv.Canny(blurred, edges, 40, 120);

      // Dilate edges slightly to close gaps
      const kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
      cv.dilate(edges, edges, kernel);
      kernel.delete();

      cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      const detected = [];

      for (let i = 0; i < contours.size(); i++) {
        const contour = contours.get(i);
        const shape = classifyContour(contour);

        if (shape) {
          const { cx, cy } = drawShapeOverlay(shape, contour);
          detected.push({ ...shape, cx, cy });
          shape.approx.delete();
        }
        contour.delete();
      }

      updateInfoPanel(detected);

      src.delete(); gray.delete(); blurred.delete();
      edges.delete(); contours.delete(); hierarchy.delete();

      requestAnimationFrame(processLoop);
    }
  </script>
</body>
</html>
