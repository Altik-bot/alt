<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auth with Face ID</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
body {
  margin: 0;
  background-color: #344e41;
  font-family: "Space Grotesk", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.auth-container {
  width: 380px;
  background: #22332b;
  padding: 25px;
  border-radius: 20px;
  color: #dae9c1;
}

.tabs {
  display: flex;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  color: #afbe94;
}

.tab.active {
  color: #faf7ed;
  border-bottom: 2px solid #a3b18a;
}

form {
  display: none;
  flex-direction: column;
}

form.active {
  display: flex;
}

input {
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #344e41;
  color: #dae9c1;
}

button {
  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #a3b18a;
  color: #faf7ed;
  cursor: pointer;
}

video {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

.status {
  font-size: 12px;
  margin-top: 5px;
  color: #afbe94;
}
</style>
</head>

<body>

<div class="auth-container">

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Log in</div>
    <div class="tab" onclick="switchTab('signup')">Sign up</div>
  </div>

  <!-- LOGIN -->
  <form id="login" class="active">
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>

    <button type="button" onclick="startLoginFace()">Use Face ID</button>
    <video id="loginVideo" autoplay muted></video>
    <div class="status" id="loginStatus">Idle</div>

    <button type="submit">Log in</button>
  </form>

  <!-- SIGN UP -->
  <form id="signup">
    <input type="text" placeholder="Full name" required>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>

    <button type="button" onclick="registerFace()">Register Face ID</button>
    <video id="signupVideo" autoplay muted></video>
    <div class="status" id="signupStatus">Idle</div>

    <button type="submit">Create account</button>
  </form>

</div>

<script>
let savedDescriptor = null;

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll("form").forEach(f => f.classList.remove("active"));

  if (tab === "login") {
    document.querySelectorAll(".tab")[0].classList.add("active");
    document.getElementById("login").classList.add("active");
  } else {
    document.querySelectorAll(".tab")[1].classList.add("active");
    document.getElementById("signup").classList.add("active");
  }
}

async function loadModels() {
  await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
  await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
  await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
}

async function registerFace() {
  const video = document.getElementById("signupVideo");
  const status = document.getElementById("signupStatus");

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  status.innerText = "Loading...";
  await loadModels();

  status.innerText = "Capturing...";

  setTimeout(async () => {
    const detection = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection) {
      status.innerText = "Face not detected";
      return;
    }

    savedDescriptor = detection.descriptor;
    status.innerText = "Face registered";
  }, 2000);
}

async function startLoginFace() {
  const video = document.getElementById("loginVideo");
  const status = document.getElementById("loginStatus");

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  status.innerText = "Loading...";
  await loadModels();

  status.innerText = "Scanning...";

  setInterval(async () => {
    const detection = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection || !savedDescriptor) {
      status.innerText = "No match";
      return;
    }

    const distance = faceapi.euclideanDistance(
      savedDescriptor,
      detection.descriptor
    );

    if (distance < 0.5) {
      status.innerText = "Access granted";
    } else {
      status.innerText = "Access denied";
    }
  }, 1500);
}
</script>

</body>
</html>
